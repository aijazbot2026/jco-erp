<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>操作日誌 - JCO ERP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f7f7f5;
            --text-primary: #37352f;
            --text-secondary: #787774;
            --border: #e9e9e7;
            --accent: #2383e2;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            line-height: 1.5;
        }
        .app-container {
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            width: 240px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            padding: 12px;
        }
        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            margin-bottom: 16px;
        }
        .logo {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #2383e2, #0f7b6c);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 14px;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: 6px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            cursor: pointer;
        }
        .nav-item:hover { background: rgba(0,0,0,0.04); }
        .nav-item.active {
            background: rgba(35,131,226,0.1);
            color: var(--accent);
        }
        .main-content {
            flex: 1;
            padding: 32px 48px;
            overflow-y: auto;
        }
        .page-header {
            margin-bottom: 24px;
        }
        .page-title {
            font-size: 28px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .filters {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .filter-label {
            font-size: 12px;
            color: var(--text-secondary);
        }
        .filter-input, .filter-select {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            background: white;
        }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary {
            background: var(--accent);
            color: white;
        }
        .btn-secondary {
            background: white;
            border: 1px solid var(--border);
            color: var(--text-primary);
        }
        .btn:hover { opacity: 0.9; }
        .stats-row {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px 20px;
            min-width: 120px;
        }
        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
        }
        .stat-value {
            font-size: 24px;
            font-weight: 700;
        }
        .log-table {
            width: 100%;
            background: white;
            border: 1px solid var(--border);
            border-radius: 8px;
            border-collapse: collapse;
            overflow: hidden;
        }
        .log-table th, .log-table td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        .log-table th {
            background: var(--bg-secondary);
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            color: var(--text-secondary);
        }
        .log-table tr:last-child td {
            border-bottom: none;
        }
        .log-table tr:hover {
            background: rgba(0,0,0,0.02);
        }
        .action-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        .action-CREATE { background: #d4edda; color: #155724; }
        .action-UPDATE { background: #fff3cd; color: #856404; }
        .action-DELETE { background: #f8d7da; color: #721c24; }
        .action-VIEW { background: #e2e3e5; color: #383d41; }
        .action-LOGIN { background: #cce5ff; color: #004085; }
        .action-LOGOUT { background: #e2e3e5; color: #383d41; }
        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .user-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, #a8edea, #fed6e3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 600;
        }
        .empty-state {
            text-align: center;
            padding: 48px;
            color: var(--text-secondary);
        }
        .sidebar-footer {
            position: absolute;
            bottom: 12px;
            left: 12px;
            right: 12px;
        }
        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            border-radius: 6px;
        }
        .logout-btn {
            margin-left: auto;
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            opacity: 0.6;
        }
        .logout-btn:hover { opacity: 1; background: #fee2e2; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">J</div>
                <span style="font-weight: 600;">JCO ERP</span>
            </div>
            <nav>
                <a href="erp-dashboard-notion.html" class="nav-item">📊 主控台</a>
                <a href="erp-order-center-notion.html" class="nav-item">📦 訂單中心</a>
                <a href="#" class="nav-item active">📋 操作日誌</a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="user-avatar" id="user-avatar">--</div>
                    <span id="user-name">載入中...</span>
                    <button class="logout-btn" onclick="logout()" title="登出">🚪</button>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <h1 class="page-title">📋 操作日誌</h1>
                <p style="color: var(--text-secondary); margin-top: 4px;">追蹤所有使用者操作記錄</p>
            </div>

            <div class="stats-row">
                <div class="stat-card">
                    <div class="stat-label">總記錄</div>
                    <div class="stat-value" id="stat-total">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">今日</div>
                    <div class="stat-value" id="stat-today">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">新增</div>
                    <div class="stat-value" id="stat-create">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">修改</div>
                    <div class="stat-value" id="stat-update">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">刪除</div>
                    <div class="stat-value" id="stat-delete">0</div>
                </div>
            </div>

            <div class="filters">
                <div class="filter-group">
                    <label class="filter-label">使用者</label>
                    <select class="filter-select" id="filter-user">
                        <option value="">全部</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label class="filter-label">操作類型</label>
                    <select class="filter-select" id="filter-action">
                        <option value="">全部</option>
                        <option value="CREATE">新增</option>
                        <option value="UPDATE">修改</option>
                        <option value="DELETE">刪除</option>
                        <option value="VIEW">查看</option>
                        <option value="LOGIN">登入</option>
                        <option value="LOGOUT">登出</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label class="filter-label">模組</label>
                    <select class="filter-select" id="filter-module">
                        <option value="">全部</option>
                        <option value="orders">訂單</option>
                        <option value="customers">客戶</option>
                        <option value="inventory">庫存</option>
                        <option value="system">系統</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label class="filter-label">日期從</label>
                    <input type="date" class="filter-input" id="filter-date-from">
                </div>
                <div class="filter-group">
                    <label class="filter-label">日期到</label>
                    <input type="date" class="filter-input" id="filter-date-to">
                </div>
                <div class="filter-group" style="justify-content: flex-end;">
                    <label class="filter-label">&nbsp;</label>
                    <div style="display: flex; gap: 8px;">
                        <button class="btn btn-primary" onclick="applyFilters()">🔍 篩選</button>
                        <button class="btn btn-secondary" onclick="exportLogs()">📥 匯出 CSV</button>
                    </div>
                </div>
            </div>

            <table class="log-table">
                <thead>
                    <tr>
                        <th>時間</th>
                        <th>使用者</th>
                        <th>操作</th>
                        <th>模組</th>
                        <th>描述</th>
                    </tr>
                </thead>
                <tbody id="log-body">
                </tbody>
            </table>

            <div id="empty-state" class="empty-state" style="display: none;">
                📭 目前沒有日誌記錄
            </div>
        </main>
    </div>

    <script src="audit-logger.js"></script>
    <script>
        // 權限檢查
        function checkPermission() {
            const session = JSON.parse(localStorage.getItem('JCO_ERP_SESSION') || 'null');
            if (!session) {
                window.location.href = 'erp-login-notion.html';
                return false;
            }
            if (session.role !== 'admin' && session.role !== 'manager') {
                alert('您沒有權限查看操作日誌');
                window.location.href = 'erp-dashboard-notion.html';
                return false;
            }
            return true;
        }

        // 載入使用者資訊
        function loadUserInfo() {
            const session = JSON.parse(localStorage.getItem('JCO_ERP_SESSION') || 'null');
            if (session) {
                document.getElementById('user-avatar').textContent = session.name.substring(0, 2);
                document.getElementById('user-name').textContent = session.name;
            }
        }

        // 登出
        function logout() {
            if (confirm('確定要登出嗎？')) {
                AuditLogger.logLogout();
                localStorage.removeItem('JCO_ERP_SESSION');
                window.location.href = 'erp-login-notion.html';
            }
        }

        // 載入日誌
        function loadLogs(filters = {}) {
            const logs = AuditLogger.query(filters);
            const allLogs = AuditLogger.getLogs();
            
            // 更新統計
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('stat-total').textContent = allLogs.length;
            document.getElementById('stat-today').textContent = allLogs.filter(l => l.timestamp.startsWith(today)).length;
            document.getElementById('stat-create').textContent = allLogs.filter(l => l.action === 'CREATE').length;
            document.getElementById('stat-update').textContent = allLogs.filter(l => l.action === 'UPDATE').length;
            document.getElementById('stat-delete').textContent = allLogs.filter(l => l.action === 'DELETE').length;

            // 填充使用者下拉選單
            const users = [...new Set(allLogs.map(l => l.user.username))];
            const userSelect = document.getElementById('filter-user');
            userSelect.innerHTML = '<option value="">全部</option>' + 
                users.map(u => `<option value="${u}">${allLogs.find(l => l.user.username === u).user.name}</option>`).join('');

            // 渲染表格
            const tbody = document.getElementById('log-body');
            const emptyState = document.getElementById('empty-state');
            
            if (logs.length === 0) {
                tbody.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }
            
            emptyState.style.display = 'none';
            tbody.innerHTML = logs.map(log => `
                <tr>
                    <td>${new Date(log.timestamp).toLocaleString('zh-TW')}</td>
                    <td>
                        <div class="user-info">
                            <div class="user-avatar">${log.user.name.substring(0, 2)}</div>
                            <span>${log.user.name}</span>
                        </div>
                    </td>
                    <td><span class="action-badge action-${log.action}">${getActionLabel(log.action)}</span></td>
                    <td>${getModuleLabel(log.module)}</td>
                    <td>${log.description}</td>
                </tr>
            `).join('');
        }

        function getActionLabel(action) {
            const labels = {
                'CREATE': '新增',
                'UPDATE': '修改',
                'DELETE': '刪除',
                'VIEW': '查看',
                'LOGIN': '登入',
                'LOGOUT': '登出'
            };
            return labels[action] || action;
        }

        function getModuleLabel(module) {
            const labels = {
                'orders': '訂單',
                'customers': '客戶',
                'inventory': '庫存',
                'system': '系統',
                'production': '生產',
                'quality': '品質'
            };
            return labels[module] || module;
        }

        function applyFilters() {
            const filters = {
                user: document.getElementById('filter-user').value,
                action: document.getElementById('filter-action').value,
                module: document.getElementById('filter-module').value,
                dateFrom: document.getElementById('filter-date-from').value,
                dateTo: document.getElementById('filter-date-to').value
            };
            
            // 移除空值
            Object.keys(filters).forEach(key => {
                if (!filters[key]) delete filters[key];
            });
            
            loadLogs(filters);
        }

        function exportLogs() {
            AuditLogger.exportCSV();
        }

        // 初始化
        if (checkPermission()) {
            loadUserInfo();
            loadLogs();
        }
    </script>
</body>
</html>
