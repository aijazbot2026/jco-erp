<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>品質中心 - JCO ERP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg-primary: #ffffff; --bg-secondary: #f7f6f3; --bg-hover: #efefef; --text-primary: #37352f; --text-secondary: #787774; --text-light: #9b9a97; --border: #e9e9e7; --accent: #2383e2; --accent-light: #e8f4fd; --success: #0f7b6c; --warning: #d9730d; --error: #e03e3e; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg-primary); color: var(--text-primary); line-height: 1.5; font-size: 14px; }
        .app-container { display: flex; height: 100vh; }
        .sidebar { width: 240px; background: var(--bg-secondary); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar-header { padding: 12px 14px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
        .sidebar-header .logo { width: 24px; height: 24px; background: linear-gradient(135deg, #2383e2, #0f7b6c); border-radius: 6px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 12px; }
        .sidebar-nav { padding: 8px; flex: 1; }
        .nav-section { margin-bottom: 16px; }
        .nav-section-title { font-size: 11px; font-weight: 600; color: var(--text-light); text-transform: uppercase; padding: 8px 8px 4px; }
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 6px; cursor: pointer; color: var(--text-secondary); text-decoration: none; }
        .nav-item:hover { background: var(--bg-hover); }
        .nav-item.active { background: var(--bg-hover); color: var(--text-primary); font-weight: 500; }
        .nav-item .icon { font-size: 18px; width: 22px; text-align: center; }
        .main-content { flex: 1; overflow-y: auto; }
        .page-header { padding: 40px 60px 24px; border-bottom: 1px solid var(--border); }
        .page-title { font-size: 32px; font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }
        .page-body { padding: 24px 60px 60px; }
        .stats-row { display: flex; gap: 12px; margin-bottom: 32px; flex-wrap: wrap; }
        .stat-card { background: var(--bg-secondary); border-radius: 8px; padding: 16px 20px; min-width: 140px; flex: 1; }
        .stat-card .label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
        .stat-card .value { font-size: 28px; font-weight: 700; }
        .stat-card.primary .value { color: var(--accent); }
        .stat-card.success .value { color: var(--success); }
        .stat-card.warning .value { color: var(--warning); }
        .stat-card.error .value { color: var(--error); }
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
        .toolbar-left { display: flex; gap: 12px; align-items: center; }
        .search-box { display: flex; align-items: center; gap: 8px; background: var(--bg-secondary); border-radius: 6px; padding: 8px 12px; }
        .search-input { border: none; background: transparent; outline: none; font-size: 14px; width: 200px; }
        .filter-select { padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; background: white; font-size: 14px; }
        .btn { padding: 8px 16px; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 6px; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: var(--bg-secondary); color: var(--text-primary); border: 1px solid var(--border); }
        .btn-danger { background: var(--error); color: white; }
        .btn-success { background: var(--success); color: white; }
        .tabs { display: flex; gap: 4px; margin-bottom: 24px; border-bottom: 1px solid var(--border); }
        .tab { padding: 10px 16px; cursor: pointer; color: var(--text-secondary); border-bottom: 2px solid transparent; margin-bottom: -1px; }
        .tab.active { color: var(--text-primary); font-weight: 500; border-bottom-color: var(--text-primary); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th, .data-table td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); }
        .data-table th { font-weight: 600; font-size: 12px; color: var(--text-secondary); text-transform: uppercase; background: var(--bg-secondary); }
        .data-table tr:hover { background: var(--bg-secondary); }
        .status-tag { display: inline-flex; padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: 500; }
        .status-pending { background: #fdecc8; color: #9a6700; }
        .status-pass { background: #ddedea; color: #0f7b6c; }
        .status-fail { background: #fbe4e4; color: #c93030; }
        .status-hold { background: #e8deee; color: #6940a5; }
        .dropdown { position: relative; display: inline-block; }
        .dropdown-content { display: none; position: absolute; right: 0; background: white; min-width: 160px; box-shadow: 0 4px 16px rgba(0,0,0,0.12); border-radius: 8px; z-index: 100; }
        .dropdown-content.show { display: block; }
        .dropdown-item { display: block; padding: 10px 16px; cursor: pointer; }
        .dropdown-item:hover { background: var(--bg-secondary); }
        .dropdown-item.danger { color: var(--error); }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 1000; justify-content: center; align-items: center; }
        .modal-overlay.show { display: flex; }
        .modal { background: white; border-radius: 12px; width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto; }
        .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .modal-title { font-size: 18px; font-weight: 600; }
        .modal-close { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text-secondary); }
        .modal-body { padding: 24px; }
        .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 12px; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; }
        .form-input, .form-select, .form-textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .defect-card { background: var(--bg-secondary); border-radius: 8px; padding: 16px; margin-bottom: 12px; border-left: 4px solid var(--error); }
        .defect-card.minor { border-left-color: var(--warning); }
        .defect-card.critical { border-left-color: var(--error); }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #37352f; color: white; padding: 12px 20px; border-radius: 8px; z-index: 9999; }
        .user-info { padding: 12px 14px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
        .user-avatar { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; color: white; font-size: 12px; font-weight: 600; }
        .checklist { background: var(--bg-secondary); border-radius: 8px; padding: 16px; }
        .checklist-item { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--border); }
        .checklist-item:last-child { border-bottom: none; }
        .checklist-item input[type="checkbox"] { width: 18px; height: 18px; }
        .progress-ring { width: 120px; height: 120px; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <div class="sidebar-header"><div class="logo">J</div><div class="title">JCO ERP</div></div>
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">主選單</div>
                    <a href="erp-dashboard-notion.html" class="nav-item"><span class="icon">🏠</span>儀表板</a>
                    <a href="erp-order-center-notion.html" class="nav-item"><span class="icon">📦</span>訂單中心</a>
                    <a href="erp-procurement-center-notion.html" class="nav-item"><span class="icon">🛒</span>採購中心</a>
                    <a href="erp-inventory-center-notion.html" class="nav-item"><span class="icon">📊</span>庫存中心</a>
                </div>
                <div class="nav-section">
                    <div class="nav-section-title">生產管理</div>
                    <a href="erp-production-center-notion.html" class="nav-item"><span class="icon">🏭</span>生產中心</a>
                    <a href="erp-quality-center-notion.html" class="nav-item active"><span class="icon">🔍</span>品質中心</a>
                </div>
                <div class="nav-section">
                    <div class="nav-section-title">管理</div>
                    <a href="erp-cost-center-notion.html" class="nav-item"><span class="icon">💰</span>成本中心</a>
                    <a href="erp-hr-center-notion.html" class="nav-item"><span class="icon">👥</span>人事中心</a>
                </div>
            </nav>
            <div class="user-info"><div class="user-avatar">品</div><div><div style="font-size:13px">品管主管</div><div style="font-size:11px;color:var(--text-secondary)">品管部</div></div></div>
        </div>
        <div class="main-content">
            <div class="page-header">
                <h1 class="page-title"><span style="font-size:36px">🔍</span>品質中心</h1>
                <p style="color:var(--text-secondary)">管理品質檢驗、不良品追蹤和品質報表</p>
            </div>
            <div class="page-body">
                <div class="stats-row">
                    <div class="stat-card primary"><div class="label">本月檢驗</div><div class="value" id="stat-total">0</div></div>
                    <div class="stat-card success"><div class="label">合格率</div><div class="value" id="stat-pass-rate">0%</div></div>
                    <div class="stat-card warning"><div class="label">待檢驗</div><div class="value" id="stat-pending">0</div></div>
                    <div class="stat-card error"><div class="label">不良品</div><div class="value" id="stat-defect">0</div></div>
                </div>
                <div class="toolbar">
                    <div class="toolbar-left">
                        <div class="search-box"><span>🔍</span><input type="text" class="search-input" placeholder="搜尋檢驗單..."></div>
                        <select class="filter-select" id="status-filter"><option>全部狀態</option><option>待檢驗</option><option>合格</option><option>不合格</option><option>待複檢</option></select>
                        <select class="filter-select" id="type-filter"><option>全部類型</option><option>進料檢驗</option><option>製程檢驗</option><option>成品檢驗</option><option>出貨檢驗</option></select>
                    </div>
                    <div style="display:flex;gap:8px">
                        <button class="btn btn-secondary" onclick="exportData()">📥 匯出</button>
                        <button class="btn btn-primary" onclick="showAddModal()">+ 新增檢驗單</button>
                    </div>
                </div>
                <div class="tabs">
                    <div class="tab active" data-tab="list">📋 檢驗清單</div>
                    <div class="tab" data-tab="defects">⚠️ 不良品追蹤</div>
                    <div class="tab" data-tab="checklist">✅ 檢驗標準</div>
                    <div class="tab" data-tab="reports">📈 品質報表</div>
                </div>
                <div class="tab-content active" id="tab-list">
                    <table class="data-table">
                        <thead><tr><th>檢驗單號</th><th>類型</th><th>關聯單號</th><th>產品</th><th>檢驗數</th><th>不良數</th><th>檢驗員</th><th>日期</th><th>結果</th><th>操作</th></tr></thead>
                        <tbody id="quality-table-body"></tbody>
                    </table>
                </div>
                <div class="tab-content" id="tab-defects">
                    <div id="defects-container"></div>
                </div>
                <div class="tab-content" id="tab-checklist">
                    <h3 style="margin-bottom:16px">櫥櫃成品檢驗標準</h3>
                    <div class="checklist" id="checklist-container"></div>
                </div>
                <div class="tab-content" id="tab-reports">
                    <div class="stats-row">
                        <div class="stat-card"><div class="label">本月檢驗批次</div><div class="value" id="report-batches">0</div></div>
                        <div class="stat-card"><div class="label">平均合格率</div><div class="value" id="report-avg-rate">0%</div></div>
                        <div class="stat-card"><div class="label">最常見不良</div><div class="value" id="report-top-defect">-</div></div>
                        <div class="stat-card"><div class="label">客訴件數</div><div class="value" id="report-complaints">0</div></div>
                    </div>
                    <h3 style="margin:24px 0 16px">不良類型分布</h3>
                    <div id="defect-chart" style="display:flex;gap:8px;height:150px;align-items:flex-end;padding:20px;background:var(--bg-secondary);border-radius:8px"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="add-modal">
        <div class="modal">
            <div class="modal-header"><h3 class="modal-title" id="modal-title">新增檢驗單</h3><button class="modal-close" onclick="closeAddModal()">&times;</button></div>
            <div class="modal-body">
                <input type="hidden" id="edit-index" value="-1">
                <div class="form-row">
                    <div class="form-group"><label class="form-label">檢驗單號</label><input type="text" class="form-input" id="qc-number" readonly></div>
                    <div class="form-group"><label class="form-label">檢驗類型</label><select class="form-select" id="qc-type"><option>進料檢驗</option><option>製程檢驗</option><option>成品檢驗</option><option>出貨檢驗</option></select></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label class="form-label">關聯單號</label><input type="text" class="form-input" id="qc-ref" placeholder="WO-/PO-/PR-"></div>
                    <div class="form-group"><label class="form-label">產品名稱</label><input type="text" class="form-input" id="qc-product" placeholder="產品名稱"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label class="form-label">檢驗數量</label><input type="number" class="form-input" id="qc-qty" placeholder="0"></div>
                    <div class="form-group"><label class="form-label">不良數量</label><input type="number" class="form-input" id="qc-defect" placeholder="0"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label class="form-label">檢驗員</label><input type="text" class="form-input" id="qc-inspector" value="品管員"></div>
                    <div class="form-group"><label class="form-label">檢驗日期</label><input type="date" class="form-input" id="qc-date"></div>
                </div>
                <div class="form-group"><label class="form-label">不良描述</label><textarea class="form-textarea" id="qc-notes" rows="2" placeholder="不良原因說明..."></textarea></div>
            </div>
            <div class="modal-footer"><button class="btn btn-secondary" onclick="closeAddModal()">取消</button><button class="btn btn-primary" onclick="saveQuality()">儲存</button></div>
        </div>
    </div>

    <div class="modal-overlay" id="result-modal">
        <div class="modal" style="max-width:400px">
            <div class="modal-header"><h3 class="modal-title">判定結果</h3><button class="modal-close" onclick="closeResultModal()">&times;</button></div>
            <div class="modal-body">
                <input type="hidden" id="result-index">
                <div class="form-group"><label class="form-label">檢驗結果</label><select class="form-select" id="qc-result"><option value="合格">✅ 合格</option><option value="不合格">❌ 不合格</option><option value="待複檢">🔄 待複檢</option></select></div>
                <div class="form-group"><label class="form-label">處理方式</label><select class="form-select" id="qc-action"><option>放行</option><option>退貨</option><option>返工</option><option>報廢</option><option>特採</option></select></div>
            </div>
            <div class="modal-footer"><button class="btn btn-secondary" onclick="closeResultModal()">取消</button><button class="btn btn-primary" onclick="updateResult()">確認</button></div>
        </div>
    </div>

    <div class="modal-overlay" id="delete-modal">
        <div class="modal" style="max-width:400px">
            <div class="modal-header"><h3 class="modal-title">確認刪除</h3><button class="modal-close" onclick="closeDeleteModal()">&times;</button></div>
            <div class="modal-body"><input type="hidden" id="delete-index"><p>確定要刪除此檢驗單嗎？</p><p id="delete-info" style="margin-top:12px;padding:12px;background:var(--bg-secondary);border-radius:6px"></p></div>
            <div class="modal-footer"><button class="btn btn-secondary" onclick="closeDeleteModal()">取消</button><button class="btn btn-danger" onclick="confirmDelete()">確認刪除</button></div>
        </div>
    </div>

    <script src="api-connector.js"></script>
    <script src="audit-logger.js"></script>
    <script>
        let qualityData = [];
        const demoData = [
            ['QC-2026-001', '成品檢驗', 'WO-2026-001', 'B36 Base Cabinet', 50, 2, '品管員', '2026-03-10', '合格', '放行', '輕微刮痕'],
            ['QC-2026-002', '進料檢驗', 'PR-2026-001', '白樺膠合板 18mm', 100, 0, '品管員', '2026-03-09', '合格', '放行', ''],
            ['QC-2026-003', '製程檢驗', 'WO-2026-002', 'W3030 Wall Cabinet', 30, 3, '品管員', '2026-03-08', '不合格', '返工', '油漆色差'],
            ['QC-2026-004', '成品檢驗', 'WO-2026-003', 'VB36 Vanity Base', 40, 0, '品管員', '2026-03-11', '待檢驗', '', ''],
            ['QC-2026-005', '出貨檢驗', 'PO-2026-001', 'B36 +2項', 200, 1, '品管員', '2026-03-07', '合格', '放行', '包裝輕微破損']
        ];
        const checklistItems = [
            { id: 1, name: '外觀檢查 - 無刮痕、無色差', required: true },
            { id: 2, name: '尺寸檢查 - 符合圖紙公差', required: true },
            { id: 3, name: '結構檢查 - 門板開合順暢', required: true },
            { id: 4, name: '五金檢查 - 滑軌順暢、鉸鏈穩固', required: true },
            { id: 5, name: '油漆檢查 - 光澤度、附著力', required: true },
            { id: 6, name: '包裝檢查 - 保護完整', required: false },
            { id: 7, name: '標籤檢查 - 品號正確', required: true },
            { id: 8, name: '配件檢查 - 數量完整', required: false }
        ];
        const defectTypes = ['刮痕', '色差', '尺寸偏差', '五金問題', '油漆問題', '包裝破損', '配件缺少', '結構問題'];

        document.addEventListener('DOMContentLoaded', async () => {
            if (window.erpApi) {
                try {
                    const apiData = await erpApi.getSheetData('quality');
                    qualityData = apiData?.length > 0 ? apiData : demoData;
                } catch (e) { qualityData = demoData; }
            } else { qualityData = demoData; }
            renderAll();
            initTabs();
            initSearch();
            document.getElementById('qc-date').value = new Date().toISOString().split('T')[0];
        });

        function renderAll() { renderTable(); renderDefects(); renderChecklist(); renderReports(); updateStats(); }

        function updateStats() {
            const total = qualityData.length;
            const pass = qualityData.filter(q => q[8] === '合格').length;
            const pending = qualityData.filter(q => q[8] === '待檢驗').length;
            const defectCount = qualityData.reduce((sum, q) => sum + (Number(q[5]) || 0), 0);
            const passRate = total > 0 ? Math.round((pass / total) * 100) : 0;
            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-pass-rate').textContent = passRate + '%';
            document.getElementById('stat-pending').textContent = pending;
            document.getElementById('stat-defect').textContent = defectCount;
        }

        function renderTable() {
            const tbody = document.getElementById('quality-table-body');
            tbody.innerHTML = qualityData.map((qc, idx) => {
                const [qcNo, type, ref, product, qty, defect, inspector, date, result] = qc;
                const statusClass = { '合格': 'status-pass', '不合格': 'status-fail', '待檢驗': 'status-pending', '待複檢': 'status-hold' }[result] || 'status-pending';
                const defectRate = qty > 0 ? ((defect / qty) * 100).toFixed(1) : 0;
                return `<tr>
                    <td><strong>${qcNo}</strong></td>
                    <td>${type}</td>
                    <td>${ref || '-'}</td>
                    <td>${product}</td>
                    <td>${qty}</td>
                    <td>${defect} <span style="color:var(--text-secondary);font-size:12px">(${defectRate}%)</span></td>
                    <td>${inspector}</td>
                    <td>${date}</td>
                    <td><span class="status-tag ${statusClass}">${result || '待檢驗'}</span></td>
                    <td><div class="dropdown"><button class="actions-btn" onclick="toggleDropdown(this)">⋯</button><div class="dropdown-content">
                        <div class="dropdown-item" onclick="showResultModal(${idx})">📝 判定結果</div>
                        <div class="dropdown-item" onclick="editQuality(${idx})">✏️ 編輯</div>
                        <div class="dropdown-item danger" onclick="showDeleteModal(${idx})">🗑️ 刪除</div>
                    </div></div></td>
                </tr>`;
            }).join('');
        }

        function renderDefects() {
            const container = document.getElementById('defects-container');
            const defects = qualityData.filter(q => Number(q[5]) > 0);
            if (defects.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-secondary)">目前沒有不良品記錄</div>';
                return;
            }
            container.innerHTML = defects.map(qc => {
                const [qcNo, type, ref, product, qty, defect, inspector, date, result, action, notes] = qc;
                const severity = defect > 5 ? 'critical' : 'minor';
                return `<div class="defect-card ${severity}">
                    <div style="display:flex;justify-content:space-between;margin-bottom:8px">
                        <strong>${qcNo}</strong>
                        <span class="status-tag ${result === '合格' ? 'status-pass' : 'status-fail'}">${result}</span>
                    </div>
                    <div style="font-size:13px;color:var(--text-secondary);margin-bottom:8px">${product} · ${type}</div>
                    <div style="display:flex;gap:16px">
                        <div><strong>${defect}</strong> 不良品</div>
                        <div>處理: ${action || '待處理'}</div>
                    </div>
                    ${notes ? `<div style="margin-top:8px;padding:8px;background:white;border-radius:4px;font-size:13px">📝 ${notes}</div>` : ''}
                </div>`;
            }).join('');
        }

        function renderChecklist() {
            const container = document.getElementById('checklist-container');
            container.innerHTML = checklistItems.map(item => `
                <div class="checklist-item">
                    <input type="checkbox" id="check-${item.id}">
                    <label for="check-${item.id}" style="flex:1">${item.name}</label>
                    ${item.required ? '<span style="color:var(--error);font-size:12px">必檢</span>' : '<span style="color:var(--text-secondary);font-size:12px">選檢</span>'}
                </div>
            `).join('');
        }

        function renderReports() {
            const total = qualityData.length;
            const pass = qualityData.filter(q => q[8] === '合格').length;
            const avgRate = total > 0 ? Math.round((pass / total) * 100) : 0;
            document.getElementById('report-batches').textContent = total;
            document.getElementById('report-avg-rate').textContent = avgRate + '%';
            document.getElementById('report-top-defect').textContent = '油漆問題';
            document.getElementById('report-complaints').textContent = '2';
            
            const defectStats = { '刮痕': 3, '色差': 5, '尺寸': 2, '五金': 1, '油漆': 6, '包裝': 2 };
            const maxVal = Math.max(...Object.values(defectStats));
            document.getElementById('defect-chart').innerHTML = Object.entries(defectStats).map(([name, count]) => `
                <div style="flex:1;text-align:center">
                    <div style="height:${(count/maxVal)*100}px;background:${count === maxVal ? 'var(--error)' : 'var(--accent)'};border-radius:4px 4px 0 0;margin:0 4px"></div>
                    <div style="padding-top:8px;font-size:12px">${name}</div>
                    <div style="font-weight:600">${count}</div>
                </div>
            `).join('');
        }

        function initTabs() {
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    tab.classList.add('active');
                    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
                });
            });
        }

        function initSearch() {
            document.querySelector('.search-input')?.addEventListener('input', filterTable);
            document.getElementById('status-filter')?.addEventListener('change', filterTable);
            document.getElementById('type-filter')?.addEventListener('change', filterTable);
        }

        function filterTable() {
            const keyword = document.querySelector('.search-input')?.value.toLowerCase() || '';
            const statusFilter = document.getElementById('status-filter')?.value || '全部狀態';
            const typeFilter = document.getElementById('type-filter')?.value || '全部類型';
            document.querySelectorAll('#quality-table-body tr').forEach(row => {
                const text = row.textContent.toLowerCase();
                const status = row.querySelector('.status-tag')?.textContent || '';
                const type = row.cells[1]?.textContent || '';
                const match = text.includes(keyword) && (statusFilter === '全部狀態' || status === statusFilter) && (typeFilter === '全部類型' || type === typeFilter);
                row.style.display = match ? '' : 'none';
            });
        }

        function generateQCNumber() {
            const year = new Date().getFullYear();
            return `QC-${year}-${String(qualityData.length + 1).padStart(3, '0')}`;
        }

        function showAddModal() {
            document.getElementById('modal-title').textContent = '新增檢驗單';
            document.getElementById('edit-index').value = -1;
            document.getElementById('qc-number').value = generateQCNumber();
            document.getElementById('qc-date').value = new Date().toISOString().split('T')[0];
            ['qc-ref', 'qc-product', 'qc-qty', 'qc-defect', 'qc-notes'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('qc-inspector').value = '品管員';
            document.getElementById('add-modal').classList.add('show');
        }

        function closeAddModal() { document.getElementById('add-modal').classList.remove('show'); }

        function editQuality(idx) {
            const qc = qualityData[idx];
            if (!qc) return;
            document.getElementById('modal-title').textContent = '編輯檢驗單';
            document.getElementById('edit-index').value = idx;
            document.getElementById('qc-number').value = qc[0];
            document.getElementById('qc-type').value = qc[1];
            document.getElementById('qc-ref').value = qc[2];
            document.getElementById('qc-product').value = qc[3];
            document.getElementById('qc-qty').value = qc[4];
            document.getElementById('qc-defect').value = qc[5];
            document.getElementById('qc-inspector').value = qc[6];
            document.getElementById('qc-date').value = qc[7];
            document.getElementById('qc-notes').value = qc[10] || '';
            document.getElementById('add-modal').classList.add('show');
            closeAllDropdowns();
        }

        async function saveQuality() {
            const idx = Number(document.getElementById('edit-index').value);
            const qcNo = document.getElementById('qc-number').value;
            const type = document.getElementById('qc-type').value;
            const ref = document.getElementById('qc-ref').value;
            const product = document.getElementById('qc-product').value;
            const qty = Number(document.getElementById('qc-qty').value) || 0;
            const defect = Number(document.getElementById('qc-defect').value) || 0;
            const inspector = document.getElementById('qc-inspector').value;
            const date = document.getElementById('qc-date').value;
            const notes = document.getElementById('qc-notes').value;
            if (!product) { showToast('⚠️ 請填寫產品名稱'); return; }
            const newQC = [qcNo, type, ref, product, qty, defect, inspector, date, '待檢驗', '', notes];
            if (idx >= 0) {
                newQC[8] = qualityData[idx][8]; newQC[9] = qualityData[idx][9];
                qualityData[idx] = newQC;
                showToast('✅ 檢驗單已更新');
            } else {
                qualityData.push(newQC);
                showToast('✅ 檢驗單已新增');
            }
            if (window.erpApi && !erpApi.forceOffline) { try { if (idx >= 0) await erpApi.updateSheetRow('quality', idx + 2, newQC); else await erpApi.appendSheetRow('quality', newQC); } catch (e) {} }
            renderAll(); closeAddModal();
        }

        function showResultModal(idx) {
            document.getElementById('result-index').value = idx;
            document.getElementById('qc-result').value = qualityData[idx][8] || '合格';
            document.getElementById('qc-action').value = qualityData[idx][9] || '放行';
            document.getElementById('result-modal').classList.add('show');
            closeAllDropdowns();
        }

        function closeResultModal() { document.getElementById('result-modal').classList.remove('show'); }

        async function updateResult() {
            const idx = Number(document.getElementById('result-index').value);
            const result = document.getElementById('qc-result').value;
            const action = document.getElementById('qc-action').value;
            if (idx >= 0 && qualityData[idx]) {
                qualityData[idx][8] = result;
                qualityData[idx][9] = action;
                showToast(`✅ 判定完成: ${result} · ${action}`);
                if (window.erpApi && !erpApi.forceOffline) { try { await erpApi.updateSheetRow('quality', idx + 2, qualityData[idx]); } catch (e) {} }
                renderAll();
            }
            closeResultModal();
        }

        function showDeleteModal(idx) {
            document.getElementById('delete-index').value = idx;
            document.getElementById('delete-info').innerHTML = `<strong>${qualityData[idx][0]}</strong> - ${qualityData[idx][3]}`;
            document.getElementById('delete-modal').classList.add('show');
            closeAllDropdowns();
        }

        function closeDeleteModal() { document.getElementById('delete-modal').classList.remove('show'); }

        async function confirmDelete() {
            const idx = Number(document.getElementById('delete-index').value);
            if (idx >= 0 && qualityData[idx]) {
                qualityData.splice(idx, 1);
                showToast('🗑️ 檢驗單已刪除');
                if (window.erpApi && !erpApi.forceOffline) { try { await erpApi.deleteSheetRow('quality', idx + 2); } catch (e) {} }
                renderAll();
            }
            closeDeleteModal();
        }

        function toggleDropdown(btn) { closeAllDropdowns(); btn.nextElementSibling.classList.toggle('show'); event.stopPropagation(); }
        function closeAllDropdowns() { document.querySelectorAll('.dropdown-content').forEach(d => d.classList.remove('show')); }
        document.addEventListener('click', closeAllDropdowns);

        function exportData() {
            let csv = '檢驗單號,類型,關聯單號,產品,檢驗數,不良數,檢驗員,日期,結果,處理,備註\n';
            qualityData.forEach(qc => { csv += qc.map(v => `"${v || ''}"`).join(',') + '\n'; });
            const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `JCO-品質報表-${new Date().toISOString().split('T')[0]}.csv`; a.click();
            showToast('📥 報表匯出成功');
        }

        function showToast(msg) { const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 3000); }

        function ensureModuleAccess() {
            const session = JSON.parse(localStorage.getItem('JCO_ERP_SESSION') || 'null');
            if (!session) {
                window.location.href = 'erp-login-notion.html';
                return;
            }
            if (session.role !== 'admin' && !(session.allowedModules || []).includes('quality')) {
                window.location.href = 'erp-dashboard-notion.html';
            }
        }

        ensureModuleAccess();
    </script>
</body>
</html>
