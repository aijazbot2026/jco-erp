<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>客戶管理 - JCO ERP</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#f7f6f3; --card:#fff; --text:#37352f; --muted:#787774; --border:#e9e9e7; --accent:#2383e2; --success:#0f7b6c; }
    *{box-sizing:border-box} body{margin:0;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:1100px;margin:0 auto;padding:32px 20px 56px}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px 24px;margin-bottom:16px}
    .top{display:flex;justify-content:space-between;align-items:center;gap:12px}.btn{display:inline-flex;padding:10px 14px;border-radius:10px;text-decoration:none;border:1px solid var(--border);color:var(--text)}
    .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)} .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.muted{color:var(--muted)}
    table{width:100%;border-collapse:collapse}th,td{text-align:left;padding:12px;border-bottom:1px solid var(--border)}th{background:#fafafa}
    @media (max-width:800px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card top">
      <div>
        <h1>🤝 客戶管理</h1>
        <div class="muted">僅開放業務主管 / 管理員查看</div>
      </div>
      <div>
        <a class="btn" href="erp-dashboard-notion.html">← 返回儀表板</a>
        <a class="btn primary" href="erp-order-center-notion.html">查看訂單中心</a>
      </div>
    </div>

    <div class="grid">
      <div class="card"><h3>活躍客戶</h3><div style="font-size:36px;font-weight:700;color:var(--accent)">12</div><div class="muted">本月有下單或報價往來</div></div>
      <div class="card"><h3>待跟進</h3><div style="font-size:36px;font-weight:700;color:#d9730d">5</div><div class="muted">3 天內需追蹤回覆</div></div>
      <div class="card"><h3>本週新詢價</h3><div style="font-size:36px;font-weight:700;color:var(--success)">3</div><div class="muted">新客戶開發進度</div></div>
    </div>

    <div class="card">
      <h2>客戶列表</h2>
      <table>
        <thead><tr><th>客戶</th><th>地區</th><th>最近往來</th><th>狀態</th><th>下一步</th></tr></thead>
        <tbody>
          <tr><td>CI</td><td>美國</td><td>今天 09:20</td><td>穩定合作</td><td>確認 3 月出貨節奏</td></tr>
          <tr><td>Cortland</td><td>美國</td><td>昨天</td><td>案件追蹤</td><td>收集新案需求</td></tr>
          <tr><td>Connie Trading</td><td>上海</td><td>2 天前</td><td>VIP</td><td>同步樣品時程</td></tr>
        </tbody>
      </table>
    </div>
  </div>
  <script>
    const session = JSON.parse(localStorage.getItem('JCO_ERP_SESSION') || 'null');
    if (!session) location.href = 'erp-login-notion.html';
    if (session && session.role !== 'admin' && !(session.allowedModules || []).includes('customers')) {
      location.href = 'erp-dashboard-notion.html';
    }
  </script>
</body>
</html>
