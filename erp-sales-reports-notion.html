<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>業務報表 - JCO ERP</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#f7f6f3; --card:#fff; --text:#37352f; --muted:#787774; --border:#e9e9e7; --accent:#2383e2; --green:#0f7b6c; }
    *{box-sizing:border-box} body{margin:0;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:1100px;margin:0 auto;padding:32px 20px 56px}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px 24px;margin-bottom:16px}
    .top{display:flex;justify-content:space-between;align-items:center;gap:12px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.muted{color:var(--muted)}
    .bar{height:14px;border-radius:999px;background:#e5e7eb;overflow:hidden}.bar>div{height:100%;background:linear-gradient(90deg,var(--accent),var(--green))}
    .btn{display:inline-flex;padding:10px 14px;border-radius:10px;text-decoration:none;border:1px solid var(--border);color:var(--text)}
    @media (max-width:800px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card top">
      <div>
        <h1>📈 業務報表</h1>
        <div class="muted">給 Eddie / 業務主管看的簡潔報表入口</div>
      </div>
      <a class="btn" href="erp-dashboard-notion.html">← 返回儀表板</a>
    </div>

    <div class="grid">
      <div class="card"><h3>本月訂單額</h3><div style="font-size:36px;font-weight:700;color:var(--accent)">$50,400</div><div class="muted">較上月 +12%</div></div>
      <div class="card"><h3>準時出貨率</h3><div style="font-size:36px;font-weight:700;color:var(--green)">94%</div><div class="muted">本週 17 單中 16 單準時</div></div>
      <div class="card"><h3>客戶回覆率</h3><div style="font-size:36px;font-weight:700;color:#d9730d">81%</div><div class="muted">近 7 天報價追蹤</div></div>
    </div>

    <div class="card">
      <h2>本月業務 KPI</h2>
      <div style="display:grid;gap:14px">
        <div><div style="display:flex;justify-content:space-between"><strong>詢價轉單率</strong><span>68%</span></div><div class="bar"><div style="width:68%"></div></div></div>
        <div><div style="display:flex;justify-content:space-between"><strong>準時回覆率</strong><span>88%</span></div><div class="bar"><div style="width:88%"></div></div></div>
        <div><div style="display:flex;justify-content:space-between"><strong>客戶滿意度</strong><span>92%</span></div><div class="bar"><div style="width:92%"></div></div></div>
      </div>
    </div>
  </div>
  <script>
    const session = JSON.parse(localStorage.getItem('JCO_ERP_SESSION') || 'null');
    if (!session) location.href = 'erp-login-notion.html';
    if (session && session.role !== 'admin' && !(session.allowedModules || []).includes('reports')) {
      location.href = 'erp-dashboard-notion.html';
    }
  </script>
</body>
</html>
