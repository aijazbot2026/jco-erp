<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>庫存中心 - JCO ERP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg-primary: #ffffff; --bg-secondary: #f7f6f3; --bg-hover: #efefef; --text-primary: #37352f; --text-secondary: #787774; --text-light: #9b9a97; --border: #e9e9e7; --accent: #2383e2; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg-primary); color: var(--text-primary); line-height: 1.5; font-size: 14px; }
        .app-container { display: flex; height: 100vh; }
        .sidebar { width: 240px; background: var(--bg-secondary); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar-header { padding: 12px 14px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
        .sidebar-header .logo { width: 24px; height: 24px; background: linear-gradient(135deg, #2383e2, #0f7b6c); border-radius: 6px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 12px; }
        .sidebar-header .title { font-weight: 600; font-size: 14px; }
        .sidebar-nav { padding: 8px; flex: 1; }
        .nav-section { margin-bottom: 16px; }
        .nav-section-title { font-size: 11px; font-weight: 600; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 8px 4px; }
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 6px; cursor: pointer; color: var(--text-secondary); text-decoration: none; }
        .nav-item:hover { background: var(--bg-hover); }
        .nav-item.active { background: var(--bg-hover); color: var(--text-primary); font-weight: 500; }
        .nav-item .icon { font-size: 18px; width: 22px; text-align: center; }
        .sidebar-footer { padding: 12px; border-top: 1px solid var(--border); }
        .user-info { display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: 6px; }
        .user-avatar { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, #a8edea, #fed6e3); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; }
        .user-name { font-size: 13px; font-weight: 500; }
        .main-content { flex: 1; overflow-y: auto; }
        .page-header { padding: 40px 60px 24px; border-bottom: 1px solid var(--border); }
        .page-title { font-size: 32px; font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }
        .page-title .emoji { font-size: 36px; }
        .page-subtitle { color: var(--text-secondary); }
        .page-body { padding: 24px 60px 60px; }
        .content-card { background: var(--bg-secondary); border-radius: 12px; padding: 40px; text-align: center; }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header"><div class="logo">J</div><span class="title">JCO ERP</span></div>
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">主要功能</div>
                    <a href="#" class="nav-item"><span class="icon">🏠</span><span>儀表板</span></a>
                    <a href="#" class="nav-item"><span class="icon">📦</span><span>訂單中心</span></a>
                    <a href="#" class="nav-item"><span class="icon">💰</span><span>成本中心</span></a>
                    <a href="#" class="nav-item"><span class="icon">🛒</span><span>採購管理</span></a>
                    <a href="#" class="nav-item"><span class="icon">📊</span><span>庫存中心</span></a>
                </div>
                <div class="nav-section">
                    <div class="nav-section-title">生產管理</div>
                    <a href="#" class="nav-item"><span class="icon">🏭</span><span>生產中心</span></a>
                    <a href="#" class="nav-item"><span class="icon">🔍</span><span>品質中心</span></a>
                </div>
                <div class="nav-section">
                    <div class="nav-section-title">系統</div>
                    <a href="#" class="nav-item"><span class="icon">👥</span><span>人事中心</span></a>
                    <a href="#" class="nav-item"><span class="icon">⚙️</span><span>設定</span></a>
                </div>
            </nav>
            <div class="sidebar-footer"><div class="user-info"><div class="user-avatar" id="user-avatar">--</div><span class="user-name" id="user-name">載入中...</span>
                    <button class="logout-btn" onclick="logout()" title="登出">🚪</button></div></div>
        </aside>
        <main class="main-content">
            <header class="page-header">
                <h1 class="page-title"><span class="emoji">📊</span>庫存中心</h1>
                <p class="page-subtitle">Notion 風格 - JCO ERP</p>
            </header>
            <div class="page-body">
                <div class="content-card">
                    <div style="font-size:64px;margin-bottom:20px">📊</div>
                    <div style="font-size:24px;font-weight:700;margin-bottom:12px">庫存中心</div>
                    <div style="color:var(--text-secondary)">模組功能已就緒</div>
                </div>
            </div>
        </main>
    </div>

    <script>
        function loadUserInfo() {
            const session = JSON.parse(localStorage.getItem('JCO_ERP_SESSION') || 'null');
            if (session) {
                const avatarEl = document.getElementById('user-avatar');
                const nameEl = document.getElementById('user-name');
                if (avatarEl) avatarEl.textContent = session.name.substring(0, 2);
                if (nameEl) nameEl.textContent = session.name;
            }
        }
        
        function logout() {
            if (confirm('確定要登出嗎？')) {
                localStorage.removeItem('JCO_ERP_SESSION');
                window.location.href = 'erp-login-notion.html';
            }
        }
        
        loadUserInfo();
    </script>
</body>
</html>
